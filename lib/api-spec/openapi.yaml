openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Telegram-clone chat API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: chats
    description: Chat operations
  - name: messages
    description: Message operations
  - name: voice
    description: Voice/Video room operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/request-otp:
    post:
      operationId: requestOtp
      tags: [auth]
      summary: Request OTP code for phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestResult"
        "400":
          description: Invalid phone number

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerify"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpVerifyResult"
        "400":
          description: Invalid or expired OTP

  /auth/setup-profile:
    post:
      operationId: setupProfile
      tags: [auth]
      summary: Complete registration by setting username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileSetup"
      responses:
        "200":
          description: Profile created, user logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Username taken or invalid data
        "401":
          description: No verified OTP session

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone/username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  # ── Users ─────────────────────────────────────────────────────────────────

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by phone or username
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Phone number or username to search
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  /users/me/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  # ── Chats ─────────────────────────────────────────────────────────────────

  /chats:
    get:
      operationId: listChats
      tags: [chats]
      summary: List all chats for current user
      responses:
        "200":
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSummary"
        "401":
          description: Not authenticated

    post:
      operationId: createChat
      tags: [chats]
      summary: Create a direct chat or group chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "201":
          description: Chat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          description: Not authenticated

  /chats/{chatId}:
    get:
      operationId: getChat
      tags: [chats]
      summary: Get a specific chat with member details
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "404":
          description: Chat not found

    patch:
      operationId: updateChat
      tags: [chats]
      summary: Update group chat details (name, description)
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatUpdate"
      responses:
        "200":
          description: Chat updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{chatId}/members:
    post:
      operationId: addChatMember
      tags: [chats]
      summary: Add member to group chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInput"
      responses:
        "200":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{chatId}/members/{userId}:
    delete:
      operationId: removeChatMember
      tags: [chats]
      summary: Remove member from group chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /chats/direct/{userId}:
    post:
      operationId: openDirectChat
      tags: [chats]
      summary: Open or get an existing direct chat with a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Direct chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  # ── Messages ──────────────────────────────────────────────────────────────

  /chats/{chatId}/messages:
    get:
      operationId: getChatMessages
      tags: [messages]
      summary: List messages in a chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
        - name: before
          in: query
          required: false
          schema:
            type: integer
          description: Cursor for pagination (message ID)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /chats/{chatId}/messages/{messageId}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Voice rooms ───────────────────────────────────────────────────────────

  /chats/{chatId}/voice:
    get:
      operationId: getVoiceRoom
      tags: [voice]
      summary: Get active voice/video room participants for a group chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Voice room state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceRoom"

    post:
      operationId: joinVoiceRoom
      tags: [voice]
      summary: Join the voice/video room of a group chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceJoinInput"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceRoom"

    delete:
      operationId: leaveVoiceRoom
      tags: [voice]
      summary: Leave the voice/video room
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # ── Auth schemas ──────────────────────────────────────────────────────

    OtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          description: E.164 or local phone number

    OtpRequestResult:
      type: object
      required: [sessionId, message]
      properties:
        sessionId:
          type: string
        message:
          type: string

    OtpVerify:
      type: object
      required: [sessionId, code]
      properties:
        sessionId:
          type: string
        code:
          type: string

    OtpVerifyResult:
      type: object
      required: [verified, isNewUser, sessionToken]
      properties:
        verified:
          type: boolean
        isNewUser:
          type: boolean
        sessionToken:
          type: string
          description: Token to pass to setup-profile or login

    ProfileSetup:
      type: object
      required: [sessionToken, username, password]
      properties:
        sessionToken:
          type: string
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        bio:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Phone number or username
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # ── User schemas ──────────────────────────────────────────────────────

    User:
      type: object
      required: [id, phone, username, createdAt]
      properties:
        id:
          type: integer
        phone:
          type: string
        username:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProfileUpdate:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        bio:
          type: ["string", "null"]
        phone:
          type: string
        password:
          type: string
          minLength: 6
        avatarUrl:
          type: ["string", "null"]

    # ── Chat schemas ──────────────────────────────────────────────────────

    Chat:
      type: object
      required: [id, type, createdAt, members]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [direct, group]
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: "#/components/schemas/ChatMember"
        lastMessage:
          $ref: "#/components/schemas/Message"

    ChatSummary:
      type: object
      required: [id, type, createdAt, unreadCount]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [direct, group]
        name:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer
        otherUser:
          $ref: "#/components/schemas/User"

    ChatInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [direct, group]
        name:
          type: string
        description:
          type: string
        memberIds:
          type: array
          items:
            type: integer

    ChatUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]

    ChatMember:
      type: object
      required: [user, role, joinedAt]
      properties:
        user:
          $ref: "#/components/schemas/User"
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time

    MemberInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    # ── Message schemas ───────────────────────────────────────────────────

    Message:
      type: object
      required: [id, chatId, senderId, content, createdAt]
      properties:
        id:
          type: integer
        chatId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        sender:
          $ref: "#/components/schemas/User"

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    # ── Voice schemas ─────────────────────────────────────────────────────

    VoiceRoom:
      type: object
      required: [chatId, participants, active]
      properties:
        chatId:
          type: integer
        active:
          type: boolean
        participants:
          type: array
          items:
            $ref: "#/components/schemas/VoiceParticipant"

    VoiceParticipant:
      type: object
      required: [user, micEnabled, cameraEnabled, joinedAt]
      properties:
        user:
          $ref: "#/components/schemas/User"
        micEnabled:
          type: boolean
        cameraEnabled:
          type: boolean
        joinedAt:
          type: string
          format: date-time

    VoiceJoinInput:
      type: object
      required: [micEnabled, cameraEnabled]
      properties:
        micEnabled:
          type: boolean
        cameraEnabled:
          type: boolean
